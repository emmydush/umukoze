services:
  # Flask Application
  web:
    build: .
    container_name: umukozi_web
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATABASE_URL=postgresql://umukozi_user:${DB_PASSWORD:-umukozi_password}@db:5432/umukozi_db
    volumes:
      - ./instance:/app/instance
      - ./static/uploads:/app/static/uploads
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - umukozi_network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: umukozi_db
    environment:
      - POSTGRES_DB=umukozi_db
      - POSTGRES_USER=umukozi_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-umukozi_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - umukozi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umukozi_user -d umukozi_db"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: umukozi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - umukozi_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx reverse proxy (optional for production)
  nginx:
    image: nginx:alpine
    container_name: umukozi_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - umukozi_network

volumes:
  postgres_data:
  redis_data:

networks:
  umukozi_network:
    driver: bridge
