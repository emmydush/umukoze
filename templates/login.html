{% extends "base.html" %}

{% block title %}Login - Umukozi{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header" style="text-align: center; margin-bottom: 1.25rem;">
                <h1 style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.25rem;">{{ _('welcome_back') }}</h1>
                <p style="color: var(--text-secondary); font-size: 0.85rem;">{{ _('signin_to_account') }}</p>
            </div>
            
            <form method="POST">
                <div class="form-group" style="margin-bottom: 0.75rem;">
                    <label for="email" class="form-label" style="font-size: 0.85rem; margin-bottom: 0.25rem;">{{ _('email') }}</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="name@example.com" style="padding: 0.6rem 0.75rem;">
                </div>
                
                <div class="form-group" style="margin-bottom: 0.75rem;">
                    <label for="password" class="form-label" style="font-size: 0.85rem; margin-bottom: 0.25rem;">{{ _('password') }}</label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="{{ _('password') }}" style="padding: 0.6rem 0.75rem;">
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem;">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="checkbox" style="width: 0.9rem; height: 0.9rem; margin-right: 0.4rem; accent-color: var(--primary-color);">
                        <span style="font-size: 0.8rem; color: var(--text-secondary);">{{ _('remember_me') }}</span>
                    </label>
                    <a href="#" style="color: var(--primary-color); text-decoration: none; font-size: 0.8rem; font-weight: 600;">{{ _('forgot_password') }}</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.65rem; font-size: 0.95rem; margin-bottom: 1rem; border-radius: 0.5rem;">
                    {{ _('sign_in') }}
                </button>
            </form>
            
            <div class="auth-footer" style="margin-top: 0.5rem; padding-top: 0.75rem; border-top: 1px solid rgba(0,0,0,0.05);">
                <p style="font-size: 0.85rem;">{{ _('new_here') }} <a href="{{ url_for('register') }}" style="font-weight: 600;">{{ _('create_account') }}</a></p>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 1rem; color: var(--text-secondary); font-size: 0.875rem;">
            <p>🔒 Secure, encrypted connection</p>
        </div>
    </div>
</div>
{% endblock %}
