{% extends "base.html" %}

{% block title %}Login - Umukozi{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="{{ url_for('index') }}" class="logo-animated" style="justify-content: center; margin-bottom: 1rem; font-size: 2.5rem;">
                    <span style="--i:1; --c:#2563eb;">U</span><span style="--i:2; --c:#ef4444;">M</span><span style="--i:3; --c:#10b981;">U</span><span style="--i:4; --c:#f59e0b;">K</span><span style="--i:5; --c:#8b5cf6;">O</span><span style="--i:6; --c:#14b8a6;">Z</span><span style="--i:7; --c:#f43f5e;">I</span>
                </a>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Login to access your Umukozi account</p>
            </div>
            
            <form method="POST">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="name@example.com">
                </div>
                
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="checkbox" style="width: 1rem; height: 1rem; margin-right: 0.5rem; accent-color: var(--primary-color);">
                        <span style="font-size: 0.875rem; color: var(--text-secondary);">Remember me</span>
                    </label>
                    <a href="#" style="color: var(--primary-color); text-decoration: none; font-size: 0.875rem; font-weight: 500;">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1rem; margin-bottom: 1.5rem;">
                    Sign In
                </button>
            </form>
            

            
            <div class="auth-footer">
                <p>Don't have an account? <a href="{{ url_for('register') }}">Create an account</a></p>
            </div>
        </div>
        
        <!-- Trust Badge/Info (Optional) -->
        <div style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.875rem;">
            <p>🔒 Secure, encrypted connection</p>
        </div>
    </div>
</div>
{% endblock %}
