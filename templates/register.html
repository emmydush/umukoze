{% extends "base.html" %}

{% block title %}Register - Umukozi{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container" style="max-width: 550px;">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">{{ _('create_account_title') }}</h1>
                <p class="auth-subtitle">{{ _('create_account_subtitle') }}</p>
            </div>
            
            <form method="POST">
                <!-- Account Type Selection -->
                <div class="form-group">
                    <label for="user_type" class="form-label">{{ _('i_want_to') }}</label>
                    <select id="user_type" name="user_type" class="form-control" required>
                        <option value="" disabled selected>{{ _('select_role') }}</option>
                        <option value="worker">{{ _('role_worker') }}</option>
                        <option value="employer">{{ _('role_employer') }}</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="full_name" class="form-label">{{ _('full_name') }}</label>
                    <input type="text" id="full_name" name="full_name" class="form-control" required placeholder="John Doe">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="email" class="form-label">{{ _('email') }}</label>
                        <input type="email" id="email" name="email" class="form-control" required placeholder="john@example.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="phone" class="form-label">{{ _('phone_number') }}</label>
                        <input type="tel" id="phone" name="phone" class="form-control" required placeholder="+250 7XX XXX XXX">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="password" class="form-label">{{ _('password') }}</label>
                        <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password" class="form-label">{{ _('confirm_password') }}</label>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-control" required placeholder="••••••••">
                    </div>
                </div>
                
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label style="display: flex; align-items: flex-start; cursor: pointer;">
                        <input type="checkbox" required style="width: 1.25rem; height: 1.25rem; margin-right: 0.75rem; margin-top: 0.125rem; accent-color: var(--primary-color);">
                        <span style="font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5;">
                            {{ _('agree_to') }} <a href="#" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">{{ _('terms_of_service') }}</a> and 
                            <a href="#" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">{{ _('privacy_policy') }}</a>.
                        </span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1rem; margin-bottom: 1.5rem;">
                    {{ _('create_account') }}
                </button>
            </form>
            
            <div class="auth-footer">
                <p>{{ _('already_have_account') }} <a href="{{ url_for('login') }}">{{ _('log_in') }}</a></p>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.875rem;">
            <p>{{ _('secure_rwanda') }}</p>
        </div>
    </div>
</div>

<script>
// Password confirmation validation
document.getElementById('confirm_password').addEventListener('input', function() {
    const password = document.getElementById('password').value;
    const confirmPassword = this.value;
    
    if (password !== confirmPassword) {
        this.setCustomValidity('{{ _('passwords_match_error') }}');
    } else {
        this.setCustomValidity('');
    }
});
</script>
{% endblock %}
